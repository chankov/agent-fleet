# Reusable coms peers, grouped into named teams (parallels teams.yaml).
#
# `just team-up <name>` spawns each peer of a team in its own herdr pane
# (requires a running herdr server — https://herdr.dev),
# using the hidden `_peer` helper (coms + compact-and-continue + the persona).
#
# Each peer entry:
#   name    — coms identity (the addressable peer name); overrides persona frontmatter
#   persona — file under agents/ (without .md); its body is the role, its
#             frontmatter `description`/`color` become the coms purpose/color
#   model   — optional pi --model spec (e.g. anthropic/claude-opus-4-7); omit to
#             inherit pi's default model
#   extensions — optional comma-separated extension names under .pi/extensions/ to
#             load into this peer (routes it through `_peer-plus`). Use for a
#             chrome-devtools-mcp browser-debug peer whose `chrome_devtools__*`
#             tools a --no-extensions subagent could not get.
#   env_file — optional repo-relative KEY=VALUE file (no shell evaluation) injected
#             into the peer's pane env by herdr before the command runs. Must exist
#             at spawn or team-up refuses. Values are redacted in --dry-run output.
#             Pair with the gitignored `.env` convention from guided setup
#             (docs/agent-fleet-setup.md).
#   runner  — optional; "claude-code" spawns interactive Claude Code + its coms
#             bridge in the pane instead of a pi peer (persona not required;
#             model maps to `claude --model`). Example:
#               - name: claude-main
#                 runner: claude-code
#                 model: opus

# Hub-only workspace: `just hub-team base --project <name>` creates a Herdr
# workspace containing only the guarded hub, with no reusable coms peer panes.
base:

full:
  - name: web-debugger
    persona: web-debugger
    model: openai-codex/gpt-5.6-terra
    extensions: chrome-devtools-mcp
  - name: documenter
    persona: documenter
    model: openai-codex/gpt-5.6-terra    
  - name: researcher
    persona: researcher
    model: openai-codex/gpt-5.6-luna   

