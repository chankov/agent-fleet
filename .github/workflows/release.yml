name: Release

on:
  push:
    branches: [main]

# Only one release run at a time so the "Version Packages" PR stays sane.
concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Verify npm Trusted Publishing support
        run: |
          npm_version="$(npm --version)"
          node - "$npm_version" <<'NODE'
          const version = process.argv[2];
          const match = /^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)$/.exec(version);
          if (!match) throw new Error(`npm version must be stable semver; got ${version}`);
          const [major, minor, patch] = match.slice(1).map(BigInt);
          if (major < 11n || (major === 11n && (minor < 5n || (minor === 5n && patch < 1n)))) {
            throw new Error(`npm ${version} is below the Trusted Publishing minimum of 11.5.1`);
          }
          console.log(`npm ${version} supports Trusted Publishing`);
          NODE

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Test
        run: npm test

      - name: Verify package contents
        run: npm run pack:dry

      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          # Force a patch bump, sync the lockfile, then snapshot the bumped
          # version so the release PR contains .versions/<new-version>/.
          # Mirrors the local `version:changeset` script.
          version: npm run version:changeset
          publish: npx changeset publish
          commit: "chore: release"
          title: "chore: release"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
